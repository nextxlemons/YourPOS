{% extends "base.html" %}
{% block title %}Edit Item{% endblock %}
{% block body %}
<hr class="border border-dark border-1 opacity-50">
<div class="container-fluid">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <h4>Edit Item</h4>
        <a class="btn btn-dark opacity-75" href="{% url 'manageitems' %}">Back</a>
    </div>
    <hr class="border border-dark border-1 opacity-50">

    <div class="container my-5" style="max-width: 620px;">
        <div class="container my-5 card shadow-sm">
        <div class="card-body p-4">
            <h4 class="form-label fw-semibold">Update item details.</h4>
            <hr class="border border-dark border-1 opacity-50">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Item Name</label>
                    <input type="text" name="name" class="form-control" value="{{ item.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Category</label>
                    <select name="category" class="form-select" required>
                        <option value="">-- Select Category --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if cat.id == item.category.id %}selected{% endif %}>
                            {{ cat.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="hasVariants" name="has_variants"
                        {% if has_variants %}checked{% endif %}> 
                    <label class="form-check-label fw-semibold" for="hasVariants">Has size variants (S / L)</label>
                </div>

                <div class="mb-3 {% if has_variants %}d-none{% endif %}" id="defaultPriceSection">
                    <label class="form-label fw-semibold">Default Price(₹)</label>
                    <input type="number" name="variant_price_d" class="form-control"
                        value="{{ variants.D }}" placeholder="Price (₹)" step="0.01" min="0">
                </div>

                <div class="mb-3 {% if not has_variants %}d-none{% endif %}" id="variantSection">
                    <label class="form-label fw-semibold">Variants</label>
                    <div class="d-flex gap-2 mb-2">
                        <label class="form-label w-auto my-auto">Small</label>
                        <input type="number" name="variant_price_s" class="form-control"
                            value="{{ variants.S }}" placeholder="Price (₹)" step="0.01" min="0">
                    </div>
                    <div class="d-flex gap-2">
                        <label class="form-label w-auto my-auto">Large</label>
                        <input type="number" name="variant_price_l" class="form-control"
                            value="{{ variants.L }}" placeholder="Price (₹)" step="0.01" min="0">
                    </div>
                </div>

                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="isActive" name="is_active"
                        {% if item.is_active %}checked{% endif %}>
                    <label class="form-check-label fw-semibold" for="isActive">Active</label>
                </div>

                <button type="submit" class="btn btn-primary px-4">Update Item</button>
                <a href="{% url 'manageitems' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
        </div>
    </div>

</div>

<script>
    document.getElementById('hasVariants').addEventListener('change', function () {
        document.getElementById('defaultPriceSection').classList.toggle('d-none', this.checked);
        document.getElementById('variantSection').classList.toggle('d-none', !this.checked);
    });
</script>
{% endblock %}
